<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ServiceDesktop</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-page:     #F0EFED;
    --bg-sidebar:  #F7F7F6;
    --bg-main:     #FFFFFF;
    --bg-hover:    #EFEFED;
    --bg-active:   #FFFFFF;
    --bg-code:     #F7F7F6;

    --text-primary:   #111111;
    --text-secondary: #6B7280;
    --text-tertiary:  #9CA3AF;
    --text-mono:      #374151;

    --accent:       #2563EB;
    --accent-light: #EFF4FF;

    --green:        #16A34A;
    --green-bg:     #F0FDF4;
    --red:          #DC2626;
    --red-bg:       #FEF2F2;
    --orange:       #D97706;
    --orange-bg:    #FFFBEB;
    --gray-dot:     #D1D5DB;

    --border:       #E5E5E3;
    --border-light: #EFEFED;

    --radius-sm: 5px;
    --radius-md: 8px;
    --radius-lg: 10px;

    --font-sans: -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;

    --sidebar-w: 210px;
    --titlebar-h: 44px;
  }

  html, body {
    height: 100%;
    font-family: var(--font-sans);
    background: var(--bg-page);
    color: var(--text-primary);
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 1200px;
    margin: 0 auto;
    background: var(--bg-page);
  }

  .titlebar {
    height: var(--titlebar-h);
    background: var(--bg-sidebar);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    justify-content: space-between;
    flex-shrink: 0;
    -webkit-app-region: drag;
  }
  .titlebar-left {
    display: flex;
    align-items: center;
    gap: 10px;
    -webkit-app-region: no-drag;
  }
  .traffic-lights { display: flex; gap: 5px; }
  .tl { width: 11px; height: 11px; border-radius: 50%; cursor: pointer; }
  .tl-close  { background: #FF5F57; }
  .tl-min    { background: #FEBC2E; }
  .tl-max    { background: #28C840; }
  .app-brand { display: flex; align-items: center; gap: 7px; margin-left: 6px; }
  .app-icon {
    width: 22px; height: 22px;
    background: var(--accent);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .app-icon svg { width: 13px; height: 13px; fill: none; stroke: #fff; stroke-width: 1.8; }
  .app-name {
    font-size: 13px; font-weight: 500; color: var(--text-primary); letter-spacing: -0.01em;
  }
  .titlebar-right {
    display: flex; align-items: center; gap: 6px; -webkit-app-region: no-drag;
  }
  .tb-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--bg-main);
    color: var(--text-secondary);
    font-size: 12px;
    font-family: var(--font-sans);
    cursor: pointer;
    transition: background .12s, border-color .12s;
  }
  .tb-btn:hover { background: var(--bg-hover); }
  .tb-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
  .tb-btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tb-btn-primary:hover { background: #1d4ed8; }

  .body { flex: 1; display: flex; overflow: hidden; }

  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
  }
  .sidebar-search { padding: 10px 10px 8px; border-bottom: 1px solid var(--border-light); }
  .search-wrap {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg-main); border: 1px solid var(--border); border-radius: var(--radius-md);
    padding: 5px 9px;
  }
  .search-wrap svg { width: 13px; height: 13px; stroke: var(--text-tertiary); flex-shrink: 0; }
  .search-wrap input {
    border: none; outline: none; background: none;
    font-size: 12px; font-family: var(--font-sans); color: var(--text-primary); width: 100%;
  }
  .search-wrap input::placeholder { color: var(--text-tertiary); }

  .sidebar-section {
    padding: 14px 12px 4px;
    font-size: 10px; font-weight: 600; color: var(--text-tertiary);
    letter-spacing: .07em; text-transform: uppercase;
  }
  .sidebar-list { flex: 1; overflow-y: auto; padding-bottom: 8px; }
  .sidebar-list::-webkit-scrollbar { width: 0; }

  .svc-item {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 10px 7px 12px; cursor: pointer; position: relative;
    border-left: 2px solid transparent;
    transition: background .1s;
    margin: 1px 6px 1px 0;
    border-radius: 0 var(--radius-md) var(--radius-md) 0;
  }
  .svc-item:hover { background: var(--bg-hover); }
  .svc-item.active {
    background: var(--bg-active); border-left-color: var(--accent);
    border-radius: 0 var(--radius-md) var(--radius-md) 0;
  }
  .svc-item-icon {
    width: 26px; height: 26px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .svc-item-info { flex: 1; min-width: 0; }
  .svc-item-name {
    font-size: 12.5px; font-weight: 500; color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .svc-item.active .svc-item-name { color: var(--accent); }
  .svc-item-port {
    font-size: 10.5px; color: var(--text-tertiary); font-family: var(--font-mono); margin-top: 1px;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-green  { background: var(--green); }
  .dot-gray   { background: var(--gray-dot); }
  .dot-red    { background: var(--red); }
  .dot-orange { background: var(--orange); }

  .sidebar-footer { border-top: 1px solid var(--border); padding: 8px 10px; }
  .sb-foot-item {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 8px; border-radius: var(--radius-md); cursor: pointer;
    color: var(--text-secondary); font-size: 12px; transition: background .1s;
  }
  .sb-foot-item:hover { background: var(--bg-hover); color: var(--text-primary); }
  .sb-foot-item svg { width: 14px; height: 14px; flex-shrink: 0; }

  .main { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); overflow: hidden; min-width: 0; }

  .main-bar {
    height: var(--titlebar-h);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 18px; justify-content: space-between; flex-shrink: 0;
  }
  .main-bar-left { display: flex; align-items: center; gap: 10px; }
  .main-svc-name { font-size: 14px; font-weight: 500; color: var(--text-primary); letter-spacing: -0.01em; }
  .status-badge {
    font-size: 11px; font-weight: 500;
    padding: 2px 9px; border-radius: 20px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .badge-running { background: var(--green-bg); color: var(--green); }
  .badge-stopped { background: var(--bg-hover); color: var(--text-tertiary); }
  .badge-error   { background: var(--red-bg);   color: var(--red); }
  .badge-starting{ background: var(--orange-bg); color: var(--orange); }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  .main-bar-right { display: flex; gap: 6px; }
  .action-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 11px; border: 1px solid var(--border); border-radius: var(--radius-md);
    background: none; color: var(--text-secondary);
    font-size: 12px; font-family: var(--font-sans); cursor: pointer; transition: background .12s, border-color .12s;
  }
  .action-btn:hover { background: var(--bg-hover); }
  .action-btn svg { width: 13px; height: 13px; }
  .action-btn-stop { border-color: #FECACA; color: var(--red); }
  .action-btn-stop:hover { background: var(--red-bg); }
  .action-btn-start { border-color: #BBF7D0; color: var(--green); }
  .action-btn-start:hover { background: var(--green-bg); }

  .detail { flex: 1; overflow-y: auto; padding: 20px 22px; }
  .detail::-webkit-scrollbar { width: 4px; }
  .detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .detail-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .detail-icon {
    width: 48px; height: 48px; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }
  .detail-meta-name { font-size: 17px; font-weight: 500; color: var(--text-primary); letter-spacing: -0.02em; margin-bottom: 3px; }
  .detail-meta-sub { font-size: 12px; color: var(--text-tertiary); font-family: var(--font-mono); display: flex; align-items: center; gap: 8px; }
  .meta-sep { color: var(--border); }

  .stats-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; margin-bottom: 20px; }
  .stat-card { background: var(--bg-page); border-radius: var(--radius-lg); padding: 12px 14px; }
  .stat-label { font-size: 10.5px; color: var(--text-tertiary); font-weight: 500; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em; }
  .stat-value { font-size: 18px; font-weight: 500; color: var(--text-primary); font-family: var(--font-mono); letter-spacing: -0.02em; line-height: 1; }
  .stat-unit { font-size: 12px; color: var(--text-secondary); font-family: var(--font-sans); margin-left: 2px; }

  .section-heading {
    font-size: 11px; font-weight: 600; color: var(--text-tertiary);
    letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-link {
    font-size: 11px; font-weight: 400; color: var(--accent);
    text-decoration: none; letter-spacing: 0; text-transform: none; cursor: pointer;
  }
  .section-link:hover { text-decoration: underline; }

  .log-panel { background: var(--bg-code); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 20px; }
  .log-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 12px; border-bottom: 1px solid var(--border); background: var(--bg-main);
  }
  .log-toolbar-left { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--text-secondary); }
  .log-toolbar-left svg { width: 13px; height: 13px; }
  .log-live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
  .log-toolbar-right { display: flex; gap: 4px; }
  .log-tiny-btn {
    padding: 3px 8px; border: 1px solid var(--border); border-radius: 5px;
    background: none; font-size: 11px; color: var(--text-tertiary);
    cursor: pointer; font-family: var(--font-sans);
  }
  .log-tiny-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
  .log-tiny-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* 日志工具栏 */
  .log-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 12px; border-bottom: 1px solid var(--border);
    background: var(--bg-main); gap: 8px; flex-wrap: nowrap;
  }
  .log-toolbar-left, .log-toolbar-right {
    display: flex; align-items: center; gap: 4px; flex-shrink: 0;
  }
  .log-toolbar-label { font-size: 13px; color: var(--text-tertiary); }
  .log-type-btn {
    padding: 3px 10px; border: 1px solid var(--border); border-radius: 5px;
    background: none; font-size: 11px; color: var(--text-tertiary);
    cursor: pointer; font-family: var(--font-sans); white-space: nowrap;
  }
  .log-type-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
  .log-type-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .log-select {
    padding: 3px 6px; border: 1px solid var(--border); border-radius: 5px;
    background: #fff; font-size: 11px; color: var(--text-primary);
    font-family: var(--font-sans); outline: none; max-width: 160px;
  }
  .log-tool-btn {
    padding: 3px 6px; border: 1px solid transparent; border-radius: 4px;
    background: none; font-size: 13px; cursor: pointer; color: var(--text-tertiary);
    line-height: 1;
  }
  .log-tool-btn:hover { border-color: var(--border); background: var(--bg-hover); color: var(--text-primary); }
  .log-tool-btn.active { color: var(--accent); border-color: var(--accent); }
  .log-tool-btn.log-watch-active { color: #22c55e; }
  .log-close-btn { margin-left: 4px; color: var(--text-tertiary); font-size: 14px; }
  .log-toolbar-sep { color: var(--border); font-size: 14px; margin: 0 2px; }
  .log-path-input {
    padding: 3px 6px; border: 1px solid var(--border); border-radius: 5px;
    background: #fff; font-size: 11px; color: var(--text-primary);
    font-family: var(--font-mono); outline: none; width: 260px;
  }
  .log-path-input:focus { border-color: var(--accent); }
  .log-source-select {
    padding: 2px 6px; border: 1px solid var(--border); border-radius: 5px;
    background: #fff; font-size: 11px; color: var(--text-primary);
    font-family: var(--font-sans); outline: none; min-width: 160px; max-width: 280px;
    margin-left: 4px; cursor: pointer;
  }

  /* 日志内容区 */
  .log-viewport {
    font-family: var(--font-mono); font-size: 11.5px; line-height: 1.6;
    color: var(--text-mono); overflow-y: auto; overflow-x: auto;
    height: 60vh; max-height: 600px; padding: 8px 12px;
  }
  .log-viewport .log-pre {
    margin: 0; font-family: inherit; font-size: inherit; line-height: inherit;
    white-space: pre; color: inherit;
  }
  .log-viewport .log-line {
    display: flex; gap: 8px; min-height: 1.6em;
  }
  .log-viewport .log-line:hover { background: var(--bg-hover); }
  .log-viewport .log-col-time {
    flex-shrink: 0; width: 140px; color: var(--text-tertiary);
    text-align: right; padding-right: 4px;
  }
  .log-viewport .log-col-level {
    flex-shrink: 0; width: 48px; text-align: center;
    font-weight: 600; border-radius: 3px; font-size: 10px;
    padding: 0 2px; line-height: 1.6em;
  }
  .log-viewport .log-col-level.lvl-INFO  { color: #fff; background: #3b82f6; }
  .log-viewport .log-col-level.lvl-WARN  { color: #fff; background: #f59e0b; }
  .log-viewport .log-col-level.lvl-ERROR { color: #fff; background: #ef4444; }
  .log-viewport .log-col-level.lvl-DEBUG { color: #fff; background: #6b7280; }
  .log-viewport .log-col-level.lvl-TRACE { color: #fff; background: #9ca3af; }
  .log-viewport .log-col-source {
    flex-shrink: 0; width: 180px; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; color: var(--text-tertiary); font-size: 10.5px;
    cursor: default;
  }
  .log-viewport .log-col-msg {
    flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* 详情面板预览区的列样式（和 log-viewport 一致） */
  .log-body .log-line {
    display: flex; gap: 8px; min-height: 1.6em;
  }
  .log-body .log-line:hover { background: var(--bg-hover); }
  .log-body .log-col-time {
    flex-shrink: 0; width: 110px; color: var(--text-tertiary);
    text-align: right; padding-right: 4px;
  }
  .log-body .log-col-level {
    flex-shrink: 0; width: 40px; text-align: center;
    font-weight: 600; border-radius: 3px; font-size: 10px;
    padding: 0 2px; line-height: 1.6em;
  }
  .log-body .log-col-level.lvl-INFO  { color: #fff; background: #3b82f6; }
  .log-body .log-col-level.lvl-WARN  { color: #fff; background: #f59e0b; }
  .log-body .log-col-level.lvl-ERROR { color: #fff; background: #ef4444; }
  .log-body .log-col-level.lvl-DEBUG { color: #fff; background: #6b7280; }
  .log-body .log-col-source {
    flex-shrink: 0; width: 140px; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; color: var(--text-tertiary); font-size: 10.5px;
    cursor: default;
  }
  .log-body .log-col-msg {
    flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* 日志弹窗覆盖 modal-body */
  .log-modal-box { width: 80vw; max-width: 1200px; }

  /* 详情面板实时日志点 */
.log-live-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 4px; animation: pulse-dot 1.5s ease-in-out infinite; }
.log-body { padding: 12px 14px; font-family: var(--font-mono); font-size: 11.5px; line-height: 1.75; max-height: 200px; overflow-y: auto; }
.log-body::-webkit-scrollbar { width: 3px; }
.log-body::-webkit-scrollbar-thumb { background: var(--border); }
.log-line { display: flex; gap: 12px; }
.log-time { color: var(--text-tertiary); flex-shrink: 0; }
.log-msg-dim  { color: var(--text-tertiary); }
  .log-body::-webkit-scrollbar { width: 3px; }
  .log-body::-webkit-scrollbar-thumb { background: var(--border); }
  .log-line { display: flex; gap: 12px; }
  .log-time { color: var(--text-tertiary); flex-shrink: 0; }
  .log-msg-dim  { color: var(--text-tertiary); }

  .config-panel { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .config-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 12px; background: var(--bg-main); border-bottom: 1px solid var(--border);
  }
  .config-path { font-size: 11px; font-family: var(--font-mono); color: var(--text-tertiary); display: flex; align-items: center; gap: 5px; }
  .config-path svg { width: 12px; height: 12px; }
  .config-body { background: var(--bg-code); padding: 12px 14px; font-family: var(--font-mono); font-size: 11.5px; line-height: 1.75; max-height: 160px; overflow-y: auto; }
  .config-body::-webkit-scrollbar { width: 3px; }
  .config-body::-webkit-scrollbar-thumb { background: var(--border); }

  .statusbar {
    height: 26px; background: var(--bg-sidebar); border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px; flex-shrink: 0;
  }
  .statusbar-left { display: flex; align-items: center; gap: 14px; }
  .sb-stat { font-size: 11px; color: var(--text-tertiary); display: flex; align-items: center; gap: 5px; }
  .sb-stat-dot { width: 5px; height: 5px; border-radius: 50%; }
  .sb-running { color: var(--green); }
  .sb-error   { color: var(--red); }
  .statusbar-right { font-size: 11px; color: var(--text-tertiary); }

  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

  /* Config editor modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.3); z-index: 100;
    justify-content: center; align-items: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: var(--bg-main); border-radius: 12px;
    width: 700px; max-height: 80vh;
    display: flex; flex-direction: column;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  }
  .modal-header {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-title { font-size: 14px; font-weight: 500; }
  .modal-close {
    width: 24px; height: 24px; border-radius: 50%; border: none;
    background: none; font-size: 16px; cursor: pointer; color: var(--text-tertiary);
  }
  .modal-close:hover { background: var(--bg-hover); }
  .modal-body { overflow-y: auto; padding: 16px 18px; flex: 1; }
  .modal-footer {
    padding: 12px 18px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 8px;
  }
  .code-editor {
    width: 100%; min-height: 300px;
    font-family: var(--font-mono); font-size: 12px;
    border: 1px solid var(--border); border-radius: var(--radius-md);
    padding: 12px; resize: vertical;
  }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Title bar -->
  <div class="titlebar">
    <div class="titlebar-left">
      <div class="traffic-lights">
        <div class="tl tl-close"></div>
        <div class="tl tl-min"></div>
        <div class="tl tl-max"></div>
      </div>
      <div class="app-brand">
        <div class="app-icon">
          <svg viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="3" rx="1"/><rect x="2" y="8" width="12" height="3" rx="1"/><rect x="2" y="13" width="5" height="1.5" rx=".75"/></svg>
        </div>
        <span class="app-name">ServiceDesktop</span>
      </div>
    </div>
    <div class="titlebar-right">
      <button class="tb-btn" onclick="refreshAll()">

  <!-- Body -->

      <div class="sidebar-search">

          <input type="text" placeholder="搜索服务…" id="searchInput" oninput="filterServices()" />
        </div>
      </div>
      <div class="sidebar-list" id="sidebarList"></div>
      <div class="sidebar-footer">
        <div class="sb-foot-item" onclick="showAddService()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M8 2v12M2 8h12"/></svg>
          添加服务
        </div>
        <div class="sb-foot-item" onclick="showSettings()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="8" r="2"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/></svg>

        <div class="sb-foot-item" onclick="QuitApp()" style="color:var(--red)">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 3l-4 5h3v5h2v-5h3l-4-5z"/></svg>
          退出
        </div>
      </div>
    </div>

    <!-- Main detail panel -->
    <div class="main" id="mainPanel">
      <div class="main-bar">
        <div class="main-bar-left">
          <span class="main-svc-name" id="detailName">选择一个服务</span>
          <span class="status-badge" id="detailBadge"></span>
        </div>
        <div class="main-bar-right">
          <button class="action-btn" onclick="showLogs()">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 4h12M4 8h8M6 12h4"/></svg>
            日志
          </button>
          <button class="action-btn" onclick="showConfig()">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4z"/><path d="M6 8h4M8 6v4"/></svg>
            配置
          </button>
          <button class="action-btn" onclick="showProfiles()">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 3h8M4 8h8M4 13h5"/></svg>
            参数
          </button>
          <button class="action-btn action-btn-stop" id="btnStop" onclick="stopService()">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="10" height="10" rx="1.5"/></svg>
            停止
          </button>
          <button class="action-btn action-btn-start" id="btnStart" onclick="startService()" style="display:none">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><polygon points="4,3 14,8 4,13"/></svg>
            启动
          </button>
          <button class="action-btn" id="btnRestart" onclick="restartService()" style="border-color:#E5E5E3">

            重启
          </button>
        </div>
      </div>

      <div class="detail" id="detailPanel">
        <div style="padding:40px;text-align:center;color:var(--text-tertiary)">

        </div>
      </div>
    </div>
  </div>

  <!-- Status bar -->
  <div class="statusbar">
    <div class="statusbar-left">
      <div class="sb-stat"><div class="sb-stat-dot dot-green"></div><span id="statRunning">0 运行中</span></div>
      <div class="sb-stat"><div class="sb-stat-dot dot-gray"></div><span id="statStopped">0 已停止</span></div>
      <div class="sb-stat"><div class="sb-stat-dot dot-red"></div><span id="statError">0 异常</span></div>
    </div>
    <div class="statusbar-right" id="statTime"></div>
  </div>
</div>

<!-- Config Editor Modal -->
<div class="modal-overlay" id="configModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="configModalTitle">配置文件</span>
      <button class="modal-close" onclick="closeModal('configModal')">✕</button>
    </div>
    <div class="modal-body">
      <div style="margin-bottom:8px;font-size:11px;color:var(--text-tertiary)" id="configFilePath"></div>
      <select id="configFileSelect" style="margin-bottom:8px;padding:4px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px" onchange="loadConfigFile()"></select>
      <textarea class="code-editor" id="configEditor" spellcheck="false"></textarea>
    </div>
    <div class="modal-footer">
      <button class="log-tiny-btn" onclick="closeModal('configModal')">取消</button>
      <button class="log-tiny-btn" style="border-color:var(--accent);color:var(--accent)" onclick="saveConfigFile()">保存</button>
    </div>
  </div>
</div>

<!-- Log Modal -->
<div class="modal-overlay" id="logModal">
  <div class="modal-box" style="width:80vw;max-width:1200px">
    <div class="modal-header">
      <span class="modal-title" id="logModalTitle">日志</span>
      <button class="modal-close" onclick="closeModal('logModal')">✕</button>
    </div>
    <!-- 日志选择工具栏（一行） -->
    <div class="log-toolbar">
      <div class="log-toolbar-left">
        <span class="log-toolbar-label" title="自定义实时日志文件路径，回车确认">📟</span>
        <input id="logWatchPath" type="text" class="log-path-input" placeholder="日志文件路径..."
          onkeydown="if(event.key==='Enter') setWatchPath()" />
        <button class="log-tool-btn" onclick="browseWatchPath()" title="选择日志文件">📂</button>
        <button class="log-tool-btn log-watch-active" id="logWatchIndicator" onclick="switchToWatch()" title="实时日志">●</button>
        <span class="log-toolbar-sep">|</span>
        <span class="log-toolbar-label" style="margin-left:8px">📁</span>
        <select id="logTypeSelect" class="log-select" onchange="onLogTypeChange()">
          <option value="">选择日志...</option>
        </select>
        <select id="logDateSelect" class="log-select" onchange="onLogDateChange()" disabled>
          <option value="">选择日期...</option>
        </select>
      </div>
      <div class="log-toolbar-right">
        <button class="log-tool-btn" id="logScrollBtn" onclick="toggleLogScroll()" title="自动滚动">⏬</button>
        <button class="log-tool-btn" onclick="toggleSearch()" title="搜索">🔍</button>
        <button class="log-tool-btn" onclick="clearLogContent()" title="清空">🗑</button>
        <button class="log-tool-btn log-close-btn" onclick="closeModal('logModal')" title="关闭">✕</button>
      </div>
    </div>
    <!-- 搜索栏（默认隐藏） -->
    <div id="logSearchBar" style="display:none;padding:4px 12px;border-bottom:1px solid var(--border);background:var(--bg-page)">
      <input id="logSearchInput" type="text" placeholder="搜索关键字..." style="width:100%;padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;outline:none" oninput="onLogSearch()" />
    </div>
    <div class="modal-body" style="padding:0">
      <div id="logContent" class="log-viewport">
        <pre class="log-pre">暂无日志</pre>
      </div>
    </div>
  </div>
</div>

<!-- Path Edit Modal -->
<div class="modal-overlay" id="pathModal">
  <div class="modal-box" style="width:480px">
    <div class="modal-header">
      <span class="modal-title">设置安装路径</span>
      <button class="modal-close" onclick="closeModal('pathModal')">✕</button>
    </div>
    <div class="modal-body">
      <div style="font-size:12px;color:var(--text-tertiary);margin-bottom:8px">服务: <strong id="pathModalSvcName"></strong></div>
      <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:6px">安装路径</div>
      <div style="display:flex;gap:6px">
        <input id="pathInput" type="text" style="flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:13px;font-family:var(--font-mono);outline:none" placeholder="例如: D:\tools\tomcat" />
        <button class="tb-btn" onclick="browseFolder()" title="选择文件夹">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 4a1 1 0 0 1 1-1h4l1.5 2H13a1 1 0 0 1 1 1v6a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V4z"/></svg>
          浏览

    </div>
    <div class="modal-footer">
      <button class="log-tiny-btn" onclick="closeModal('pathModal')">取消</button>
      <button class="tb-btn tb-btn-primary" style="padding:5px 16px" onclick="confirmPathEdit()">保存</button>
    </div>
  </div>
</div>

<!-- Add Service Modal -->
<div class="modal-overlay" id="addServiceModal">
  <div class="modal-box" style="width:520px">
    <div class="modal-header">
      <span class="modal-title">添加自定义服务</span>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">

        <div>
          <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px">显示名称</div>
          <input id="asDisplayName" type="text" style="width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:12px;outline:none" placeholder="My Application" />
        </div>
        <div>
          <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px">分类</div>
          <select id="asCategory" style="width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:12px;outline:none;background:#fff">

            <option value="Middleware">中间件</option>
            <option value="Database">数据库</option>
          </select>
        </div>
        <div>
          <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px">端口号</div>
          <input id="asPort" type="number" style="width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:12px;outline:none" placeholder="8080" />
        </div>
      </div>
      <div style="margin-top:10px">
        <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px">安装路径</div>
        <input id="asPath" type="text" style="width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:12px;font-family:var(--font-mono);outline:none" placeholder="D:\tools\myapp" />
      </div>
      <div style="margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px">启动命令</div>
          <input id="asStartCmd" type="text" style="width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:12px;font-family:var(--font-mono);outline:none" placeholder="bin\startup.bat" />
        </div>
        <div>
          <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px">停止命令</div>
          <input id="asStopCmd" type="text" style="width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:12px;font-family:var(--font-mono);outline:none" placeholder="bin\shutdown.bat" />
        </div>
      </div>
      <div style="margin-top:10px">
        <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px">日志文件路径</div>
        <input id="asLogFile" type="text" style="width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:12px;font-family:var(--font-mono);outline:none" placeholder="logs\app.log" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="log-tiny-btn" onclick="closeModal('addServiceModal')">取消</button>
      <button class="tb-btn tb-btn-primary" style="padding:5px 16px" onclick="confirmAddService()">添加</button>
    </div>
  </div>
</div>

<!-- Profile Modal -->
<div class="modal-overlay" id="profileModal">
...existing profile modal content...
</div>

        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="log-tiny-btn" onclick="closeModal('settingsModal')">取消</button>
      <button class="tb-btn tb-btn-primary" style="padding:5px 16px" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

          <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px">分类</div>

      </div>
      <div style="margin-top:10px">
        <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px">安装路径</div>
        <input id="esPath" type="text" style="width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:12px;font-family:var(--font-mono);outline:none" />
      </div>
      <div style="margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px">启动命令</div>
          <input id="esStartCmd" type="text" style="width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:12px;font-family:var(--font-mono);outline:none" />
        </div>
        <div>
          <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px">停止命令</div>
          <input id="esStopCmd" type="text" style="width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:12px;font-family:var(--font-mono);outline:none" />
        </div>
      </div>
      <div style="margin-top:10px">
        <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px">日志文件路径</div>
        <input id="esLogFile" type="text" style="width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:12px;font-family:var(--font-mono);outline:none" />

    </div>
    <div class="modal-footer">
      <button class="log-tiny-btn" onclick="deleteCurrentService()" id="esDeleteBtn" style="color:var(--red);margin-right:auto">删除此服务</button>

  </div>

<div id="toast" style="display:none;position:fixed;bottom:50px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,0.2);font-family:var(--font-sans);min-width:200px;text-align:center"></div>
